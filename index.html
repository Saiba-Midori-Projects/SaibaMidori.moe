    <script language="javascript" type="text/javascript">
        const countdownMessage = document.getElementById('countdown-message');
        const timerElement = document.getElementById('totalSecond');
        const statusMessage = document.getElementById('status-message');

        let seconds = parseInt(timerElement.textContent, 10); // 明确进制
        let countdown;

        function initCountdown() {
            // const countdown = setInterval(() => {

            countdown = setInterval(() => {
                if (seconds <= 0) {
                    clearInterval(countdown);
                    redirectWithFallback();
                } else {
                    seconds--;
                    timerElement.textContent = seconds;
                }

            }, 1000);
        }

        function redirectWithFallback() {
            // 尝试自动跳转
            location.href = 'https://gytxtx.github.io/';

            // 备用方案
            setTimeout(() => {
                if (!document.hidden || !document.hasFocus()) { // 检测是否仍在当前页
                    showFallbackMessage();
                }
            }, 1.5 * 1000);
        }

        function showFallbackMessage() {
            countdownMessage.textContent = '跳转似乎遇到了问题，请点击下方的链接手动访问。';
            statusMessage.innerHTML = '<a href="https://gytxtx.github.io/" target="_blank" rel="noopener noreferrer"><strong>点击这里</strong></a>';

        }

        // 处理页面可见性变化
        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                clearInterval(countdown);
            } else {
                // 重新计算剩余时间
                const remaining = seconds;
                seconds = remaining;
                if (seconds > 0) {
                    initCountdown();
                }

                if (seconds <= 0) {
                    clearInterval(countdown);
                    redirectWithFallback();
                }
            }
        });

        // 启动倒计时
        initCountdown();
    </script>
